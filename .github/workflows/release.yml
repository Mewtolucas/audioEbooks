name: Package & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create EbookReader.zip
        run: |
          mkdir -p EbookReader
          cp ebook_reader.py requirements.txt setup_and_run.sh build_app.sh README.md EbookReader/
          chmod +x EbookReader/setup_and_run.sh EbookReader/build_app.sh
          zip -r EbookReader.zip EbookReader/

      - name: Publish or update release
        run: |
          if gh release view latest &>/dev/null; then
            gh release upload latest EbookReader.zip --clobber
          else
            gh release create latest EbookReader.zip \
              --title "Ebook Reader — Latest" \
              --notes "## How to install

          1. Click **EbookReader.zip** below to download
          2. Unzip it (double-click the zip file)
          3. Open **Terminal**, type \`bash \`, drag **setup_and_run.sh** from the unzipped folder into Terminal, press Enter
          4. First run installs libraries (~30 sec). Every launch after is instant.

          **Requirements:** macOS 10.15+, Python 3.9+
          ([python.org](https://python.org) or \`brew install python3\`)"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
